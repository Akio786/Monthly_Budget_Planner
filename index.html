<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>House Budget Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="toast" class="toast"></div>

  <!-- Add Category Modal -->
  <div class="modal-overlay" id="catModalOverlay" onclick="closeCatModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modalTitle">New Category</h3>
        <button class="modal-close" onclick="closeCatModal()">✕</button>
      </div>
      <div class="form-row">
        <label>Category name</label>
        <input type="text" id="catName" placeholder="e.g. Medical" />
      </div>
      <div class="form-row">
        <label>Short code (2–3 letters)</label>
        <input type="text" id="catIcon" maxlength="3" placeholder="e.g. MD" />
      </div>
      <div class="form-row">
        <label>Color</label>
        <div class="color-picks" id="colorPicks"></div>
      </div>
      <div class="form-row">
        <label>Type</label>
        <select id="catType">
          <option value="0">Expense</option>
          <option value="1">Income</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeCatModal()">Cancel</button>
        <button class="btn primary" onclick="saveCat()">Save</button>
        <button class="btn danger" id="deleteCatBtn" style="display:none" onclick="deleteCatConfirm()">Delete</button>
      </div>
    </div>
  </div>

  <div class="app">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo-mark">HB</div>
        <div>
          <h1>House Budget</h1>
          <span class="topbar-sub">Monthly Tracker</span>
        </div>
      </div>
      <div class="topbar-right">
        <select class="month-pick" id="monthPick" onchange="onMonthChange()">
          <option>January 2025</option><option>February 2025</option>
          <option>March 2025</option><option>April 2025</option>
          <option>May 2025</option><option>June 2025</option>
          <option>July 2025</option><option>August 2025</option>
          <option>September 2025</option><option>October 2025</option>
          <option>November 2025</option><option selected>December 2025</option>
        </select>
        <div class="btn-group">
          <button class="btn outline" onclick="exportJSON()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 12L8 7L13 12M8 7V15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 4V3C1 1.9 1.9 1 3 1H13C14.1 1 15 1.9 15 3V4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Export JSON
          </button>
          <label class="btn outline" style="cursor:pointer">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 4L8 9L13 4M8 9V1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 12V13C1 14.1 1.9 15 3 15H13C14.1 15 15 14.1 15 13V12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Import JSON
            <input type="file" accept=".json" style="display:none" onchange="importJSON(event)" />
          </label>
          <button class="btn outline" onclick="exportCSV()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M1 5H15M1 9H15M1 13H15M5 1V15M11 1V15" stroke="currentColor" stroke-width="1"/></svg>
            Export CSV
          </button>
        </div>
      </div>
    </header>

    <!-- Tab Bar -->
    <nav class="tab-bar">
      <button class="tab active" data-tab="overview" onclick="switchTab('overview')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
        Overview
      </button>
      <button class="tab" data-tab="details" onclick="switchTab('details')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 4H14M2 8H14M2 12H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Details
      </button>
      <button class="tab" data-tab="edit" onclick="switchTab('edit')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M11 2L14 5L5 14H2V11L11 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        Edit
      </button>
      <button class="tab" data-tab="manage" onclick="switchTab('manage')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1V15M1 8H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Manage
      </button>
    </nav>

    <!-- Overview Tab -->
    <div id="tab-overview" class="tab-panel active">
      <div class="kpi-grid" id="kpiGrid"></div>
      <div class="two-col">
        <div class="card">
          <div class="card-head"><span class="card-title">Spending by category</span></div>
          <div class="card-body" id="barsBody"></div>
        </div>
        <div class="card">
          <div class="card-head"><span class="card-title">Budget distribution</span></div>
          <div class="card-body">
            <div class="donut-wrap">
              <div class="donut-container">
                <svg width="120" height="120" viewBox="0 0 120 120" id="donutSvg"></svg>
                <div class="donut-center" id="donutCenter"></div>
              </div>
              <div class="donut-legend" id="donutLegend"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="summary-bar" id="summaryBar"></div>
    </div>

    <!-- Details Tab -->
    <div id="tab-details" class="tab-panel">
      <div id="detailSections"></div>
    </div>

    <!-- Edit Tab -->
    <div id="tab-edit" class="tab-panel">
      <div class="info-banner">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M8 7V11M8 5V5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Edit projected and actual values — all changes auto-save to your browser.
      </div>
      <div id="editSections"></div>
    </div>

    <!-- Manage Tab -->
    <div id="tab-manage" class="tab-panel">
      <div id="manageSections"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
